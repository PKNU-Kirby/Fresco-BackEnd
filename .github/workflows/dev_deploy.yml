name: fresco dev CI/CD

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

env:
  APP_NAME : fresco
  BUILD_NAME : fresco

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && ( github.event.pull_request.base.ref == 'dev' ||  github.event.pull_request.base.ref == 'main' )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (멀티 아키 빌드용)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
      - uses: docker/setup-buildx-action@v3

      - name: Get current time
        uses: josStorer/get-current-time@v2
        id: current-time
        with:
          format: YYYY-MM-DDTHH-mm-ss
          utcOffset: "+09:00"

      - name: Show Current Time
        run: echo "CurrentTime=${{ steps.current-time.outputs.formattedTime }}"
        shell: bash

      - name: 도커 허브 로그인
        uses: docker/login-action@v3
        with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
            images: ${{ secrets.DOCKERHUB_USERNAME }}/jamjam-backend
            tags: |
              type=raw,value=latest                # 항상 latest
              type=sha                             # 8자리 커밋 SHA (보관용)

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: AWS EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }} # EC2 인스턴스 퍼블릭 DNS
          username: ec2-user
          key: ${{ secrets.PRIVATE_KEY }} # pem 키
          # 도커 작업
          script: |
            
            set -e
            cd /home/ubuntu/fresco
            
            echo "▶ pulling latest image"
            sudo docker compose pull        # :latest 이미지 갱신
            
            echo "▶ restarting containers"
            sudo docker compose up -d --remove-orphans
            
            echo "▶ cleanup old images"
            sudo docker image prune -f
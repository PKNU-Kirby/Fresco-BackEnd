name: fresco dev CI/CD

on:
  pull_request:
    branches: [ dev, main ]
  push:
    branches: [ dev ]
  workflow_dispatch:

env:
  APP_NAME: fresco
  BUILD_NAME: fresco

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (멀티 아키 빌드용)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: 도커 허브 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}  # 수정: 환경변수 사용
          tags: |
            type=raw,value=latest                # 항상 latest
            type=sha                             # 8자리 커밋 SHA (보관용)

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: AWS 배포
        uses: appleboy/ssh-action@v1  # 수정: 안정된 버전 태그 사용
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/fresco
            
            echo "▶ pulling latest image"
            sudo docker compose pull
            
            echo "▶ restarting containers"
            sudo docker compose up -d --remove-orphans
            
            echo "▶ cleanup old images"
            sudo docker image prune -f